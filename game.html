<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲內容 - 南宮搖光</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    height:100vh;

    background-image:url("bg/bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 內容卡片 */
.card{
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);

    color:white;

    width:80%;
    max-width:800px;

    padding:40px;
    border-radius:20px;
}

h1{
    margin-bottom:20px;
    color:#00ffff;
}

a{
    color:#00ffff;
    text-decoration:none;
}
.intro-text{
    line-height:1.8;
    font-size:16px;
}
</style>

</head>

<body>

<div class="card">

    <h1>遊戲內容</h1>
    <br>
    <p class="intro-text">目前主要遊玩的遊戲是APEX，也有玩英雄聯盟、迷魅狩獵、霧鎖王國，如果有人想跟搖光一起玩其他多人遊戲，也歡迎告訴我，我很願意跟你們一起玩。</p>

    <br>
    <p>我APEX的遊戲設定是，滑鼠dpi:800、內部靈敏度:1.2、ADS:0.8<p>
    <br>
    <p class="intro-text">如果對於靈敏度有任何疑問，搖光也很樂意幫忙協助調整，我對於靈敏度都是相信科學的，遊戲上有想知道什麼事情，也可以告訴我，我很樂意解答。<p>
    <br>
<p class="intro-text">如果有想學觀念上的問題，我在youtube上有相關教學，雖然不是全部，但也提到一些實用的基本觀念，如果看完教學還是不懂，可以到我直播間問我。<p>

</div>

</body>
</html>
