<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>與搖光聯繫 - 南宮搖光</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    min-height:100vh;

    background-image:url("bg/bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:40px 0;
}

.card{
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);

    color:white;

    width:80%;
    max-width:800px;

    padding:40px;
    border-radius:20px;

    line-height:1.8;
}

h1{
    margin-bottom:20px;
    color:#00ffff;
}

h2{
    color:#8fd3ff;
    margin-top:25px;
    margin-bottom:10px;
    font-size:24px;
}

.intro-text{
    font-size:16px;
    line-height:1.8;
}

.contact-box{
    margin-top:20px;
    padding:25px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:15px;
}

.contact-link{
    color:#8fd3ff;
    text-decoration:none;
    transition:0.3s;
}

.contact-link:hover{
    color:#00ffff;
}

.footer-text{
    margin-top:30px;
    opacity:0.8;
    font-style:italic;
}

.back-link{
    display:inline-block;
    margin-top:20px;

    color:#00ffff;
    text-decoration:none;
}

.back-link:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<div class="card">

    <h1>與搖光聯繫</h1>

    <p class="intro-text">
        若有任何問題、合作邀約，
        或只是想找個人聊聊天，
        都歡迎透過以下方式找到我。
    </p>

    <div class="contact-box">

        <h2>Twitch</h2>
        <p>
            <a class="contact-link" href="https://twitch.tv/yaoguang1099" target="_blank">
                twitch.tv/yaoguang1099
            </a>
        </p>

        <h2>YouTube</h2>
        <p>
            <a class="contact-link" href="https://youtube.com/@yaoguang1099" target="_blank">
               youtube.com/@yaoguang1099
            </a>
        </p>

        <h2>Discord</h2>
        <p>yaoguang1099</p>

        <h2>Email</h2>
        <p>baizhouye423@gmail.com</p>

    </div>

    <p class="footer-text">
        願星光照亮你的旅途，也願我們能在某個平凡的夜晚相遇。
    </p>

    <a class="back-link" href="index.html">← 返回首頁</a>

</div>

</body>
</html>
